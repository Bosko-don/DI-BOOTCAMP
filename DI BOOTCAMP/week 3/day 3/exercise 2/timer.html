<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1: Timer</title>
    <style>
        p {
            background: yellow;
            color: red;
            padding: 10px;
            margin: 5px 0;
        }
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #5568d3;
        }
        #container {
            margin: 20px 0;
            min-height: 50px;
        }
    </style>
</head>
<body>
    <h1>Exercise 1: Timer</h1>
    <div id="container"></div>
    <button id="clear">Clear Interval</button>

    <script>
        // ==========================================
        // PART I: Alert "Hello World" after 2 seconds
        // ==========================================
        setTimeout(function() {
            alert("Hello World");
        }, 2000);

        // ==========================================
        // PART II: Add paragraph after 2 seconds
        // ==========================================
        setTimeout(function() {
            const container = document.getElementById("container");
            const paragraph = document.createElement("p");
            paragraph.textContent = "Hello World";
            container.appendChild(paragraph);
        }, 2000);

        // ==========================================
        // PART III: Add paragraph every 2 seconds
        // ==========================================
        const container = document.getElementById("container");
        let paragraphCount = 0;
        const maxParagraphs = 5;

        // Create interval that adds paragraph every 2 seconds
        const intervalId = setInterval(function() {
            // Check if we already have 5 paragraphs
            if (paragraphCount >= maxParagraphs) {
                clearInterval(intervalId);
                return;
            }
            
            // Create and add new paragraph
            const paragraph = document.createElement("p");
            paragraph.textContent = "Hello World";
            container.appendChild(paragraph);
            paragraphCount++;
            
            // Clear interval if we reached 5 paragraphs
            if (paragraphCount >= maxParagraphs) {
                clearInterval(intervalId);
                console.log("Interval cleared: reached 5 paragraphs");
            }
        }, 2000);

        // Clear interval when button is clicked
        const clearButton = document.getElementById("clear");
        clearButton.addEventListener("click", function() {
            clearInterval(intervalId);
            console.log("Interval cleared: button clicked");
        });
    </script>
</body>
</html>
