<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 7: Secret Group</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        #output {
            background: white;
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 24px;
            text-align: center;
            color: #667eea;
        }
    </style>
</head>
<body>
    <h1>Exercise 7: Secret Group</h1>
    <div id="output"></div>

    <script>
        const names = ["Jack", "Philip", "Sarah", "Amanda", "Bernard", "Kyle"];

        // Get first letter of each name
        const firstLetters = [];
        for (let i = 0; i < names.length; i++) {
            firstLetters.push(names[i][0]); // string is array of letters
        }

        // Sort alphabetically
        firstLetters.sort();

        // Join to create secret society name
        const secretName = firstLetters.join("");

        document.getElementById('output').textContent = "Secret Society: " + secretName;
        console.log(secretName);
    </script>
</body>
</html>
