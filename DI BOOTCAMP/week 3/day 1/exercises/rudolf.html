<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6: Rudolf</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        #output {
            background: white;
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Exercise 6: Rudolf</h1>
    <div id="output"></div>

    <script>
        const details = {
            my: 'name',
            is: 'Rudolf',
            the: 'reindeer'
        };

        // Using for in loop to build sentence
        let sentence = "";
        for (let key in details) {
            sentence += key + " " + details[key] + " ";
        }
        
        // Remove trailing space
        sentence = sentence.trim();

        document.getElementById('output').textContent = sentence;
        console.log(sentence);
    </script>
</body>
</html>
