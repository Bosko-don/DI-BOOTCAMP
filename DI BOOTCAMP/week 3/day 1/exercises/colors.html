<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2: Favorite Colors</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        #output {
            background: white;
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Exercise 2: Your Favorite Colors</h1>
    <div id="output"></div>

    <script>
        let output = "";

        // Create array of colors
        const colors = ["Blue", "Red", "Green", "Purple", "Orange"];

        // Regular version
        output += "Regular version:\n";
        for (let i = 0; i < colors.length; i++) {
            output += `My #${i + 1} choice is ${colors[i]}\n`;
        }

        // Bonus: With correct suffixes
        output += "\nBonus with suffixes:\n";
        const suffixes = ["st", "nd", "rd", "th", "th"];
        
        for (let i = 0; i < colors.length; i++) {
            const suffix = suffixes[i] || "th";
            output += `My ${i + 1}${suffix} choice is ${colors[i]}\n`;
        }

        document.getElementById('output').textContent = output;
        console.log(output);
    </script>
</body>
</html>
