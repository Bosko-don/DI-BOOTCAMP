<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3: Repeat the Question</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        #output {
            background: white;
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            white-space: pre-wrap;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Exercise 3: Repeat the Question</h1>
    <button onclick="startPrompt()">Start Prompt</button>
    <div id="output"></div>

    <script>
        function startPrompt() {
            let output = "";

            // Prompt for a number
            let userInput = prompt("Enter a number:");
            
            // Check data type (prompt always returns string)
            output += `You entered: ${userInput}\n`;
            output += `Type: ${typeof userInput}\n`;
            
            // Convert to number
            let number = Number(userInput);
            output += `Converted to number: ${number}\n\n`;

            // While loop - continue while number is smaller than 10
            // Using while loop (not do...while) because we need to check condition first
            while (number < 10) {
                output += `Number ${number} is less than 10. Asking again...\n`;
                userInput = prompt("Number is too small. Enter a new number (must be >= 10):");
                number = Number(userInput);
            }

            output += `\nFinal number: ${number}\nSuccess! Number is >= 10.`;
            
            document.getElementById('output').textContent = output;
            console.log(output);
        }
    </script>
</body>
</html>
