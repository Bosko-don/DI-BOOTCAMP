<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 7: My Book List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        .book {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .book img {
            width: 100px;
            height: auto;
            border-radius: 5px;
        }
        .book-info {
            flex: 1;
        }
        .book-title {
            font-size: 18px;
            font-weight: bold;
        }
        .read {
            color: red;
        }
        .not-read {
            color: black;
        }
    </style>
</head>
<body>
    <h1>📚 My Book List</h1>
    <section class="listBooks"></section>

    <script>
        // Array of book objects
        const allBooks = [
            {
                title: "The Hobbit",
                author: "J.R.R. Tolkien",
                image: "https://upload.wikimedia.org/wikipedia/en/4/4a/TheHobbit_FirstEdition.jpg",
                alreadyRead: true
            },
            {
                title: "Harry Potter and the Philosopher's Stone",
                author: "J.K. Rowling",
                image: "https://upload.wikimedia.org/wikipedia/en/6/6b/Harry_Potter_and_the_Philosopher%27s_Stone_Book_Cover.jpg",
                alreadyRead: false
            }
        ];

        // Get the section element
        const section = document.querySelector(".listBooks");

        // Loop through books and render each
        for (let book of allBooks) {
            // Create div for the book
            const bookDiv = document.createElement("div");
            bookDiv.className = "book";
            
            // Set color based on alreadyRead status
            const textColorClass = book.alreadyRead ? "read" : "not-read";
            
            // Create book content
            bookDiv.innerHTML = `
                <img src="${book.image}" alt="${book.title}">
                <div class="book-info ${textColorClass}">
                    <div class="book-title">${book.title} written by ${book.author}</div>
                    <div>${book.alreadyRead ? "Already read" : "Not read yet"}</div>
                </div>
            `;
            
            // Add to section
            section.appendChild(bookDiv);
        }
    </script>
</body>
</html>
