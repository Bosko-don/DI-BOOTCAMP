<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2: Shopping List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        #output {
            background: white;
            padding: 20px;
            border-radius: 10px;
            white-space: pre-wrap;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Exercise 2: Shopping List</h1>
    <button onclick="runMyBill()">Calculate Bill</button>
    <div id="output"></div>

    <script>
        const stock = { 
            "banana": 6, 
            "apple": 0,
            "pear": 12,
            "orange": 32,
            "blueberry": 1
        };

        const prices = {    
            "banana": 4, 
            "apple": 2, 
            "pear": 1,
            "orange": 1.5,
            "blueberry": 10
        };

        const shoppingList = ["banana", "orange", "apple"];

        function myBill() {
            let total = 0;
            let output = "Shopping List:\n";
            
            for (let item of shoppingList) {
                // Check if item is in stock
                if (item in stock && stock[item] > 0) {
                    const price = prices[item];
                    total += price;
                    output += `${item}: $${price} (in stock: ${stock[item]})\n`;
                    
                    // Bonus: Decrease stock by 1
                    stock[item]--;
                    output += `  Stock decreased to: ${stock[item]}\n`;
                } else {
                    output += `${item}: Not in stock\n`;
                }
            }
            
            output += `\nTotal: $${total}`;
            return output;
        }

        function runMyBill() {
            const result = myBill();
            document.getElementById('output').textContent = result;
            console.log(result);
        }
    </script>
</body>
</html>
