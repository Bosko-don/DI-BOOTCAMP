<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Task Manager - useContext, useReducer & useRef</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 2rem;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .task-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .task-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .add-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        .filter-section {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #666;
        }

        .task-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .task-list::-webkit-scrollbar {
            width: 6px;
        }

        .task-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .task-list::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #fafafa;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.3s;
            animation: taskSlideIn 0.3s ease-out;
        }

        @keyframes taskSlideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .task-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .task-item.completed {
            opacity: 0.7;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #667eea;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
            background: white;
        }

        .checkbox:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .checkbox.checked {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
        }

        .checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .task-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .task-text {
            font-size: 1rem;
            color: #333;
            word-break: break-word;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .task-text:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .edit-input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .task-item:hover .task-actions {
            opacity: 1;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .edit-btn {
            background: #e3f2fd;
            color: #1976d2;
        }

        .edit-btn:hover {
            background: #1976d2;
            color: white;
        }

        .save-btn {
            background: #e8f5e9;
            color: #388e3c;
        }

        .save-btn:hover {
            background: #388e3c;
            color: white;
        }

        .cancel-btn {
            background: #ffebee;
            color: #d32f2f;
        }

        .cancel-btn:hover {
            background: #d32f2f;
            color: white;
        }

        .delete-btn {
            background: #ffebee;
            color: #d32f2f;
        }

        .delete-btn:hover {
            background: #d32f2f;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .clear-completed {
            background: none;
            border: none;
            color: #d32f2f;
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: underline;
            transition: color 0.2s;
        }

        .clear-completed:hover {
            color: #b71c1c;
        }

        .priority-select {
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 0.8rem;
            cursor: pointer;
            outline: none;
        }

        .priority-high { color: #d32f2f; }
        .priority-medium { color: #f57c00; }
        .priority-low { color: #388e3c; }

        .priority-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-high { background: #ffebee; color: #d32f2f; }
        .badge-medium { background: #fff3e0; color: #f57c00; }
        .badge-low { background: #e8f5e9; color: #388e3c; }

        @media (max-width: 480px) {
            .app-container {
                padding: 20px;
            }
            
            .task-actions {
                opacity: 1;
            }
            
            .input-section {
                flex-direction: column;
            }
            
            .add-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { createContext, useContext, useReducer, useRef, useState, useEffect } = React;

        // ==================== CONTEXT ====================
        const TaskContext = createContext();

        // ==================== REDUCER ACTIONS ====================
        const ADD_TASK = 'ADD_TASK';
        const TOGGLE_TASK = 'TOGGLE_TASK';
        const DELETE_TASK = 'DELETE_TASK';
        const EDIT_TASK = 'EDIT_TASK';
        const SET_FILTER = 'SET_FILTER';
        const CLEAR_COMPLETED = 'CLEAR_COMPLETED';
        const SET_PRIORITY = 'SET_PRIORITY';

        // ==================== INITIAL STATE ====================
        const initialState = {
            tasks: [
                { id: 1, text: "Learn React Hooks", completed: false, priority: 'high', createdAt: Date.now() },
                { id: 2, text: "Build a Task Manager", completed: true, priority: 'medium', createdAt: Date.now() - 1000 },
                { id: 3, text: "Master useReducer", completed: false, priority: 'low', createdAt: Date.now() - 2000 }
            ],
            filter: 'all' // 'all', 'active', 'completed'
        };

        // ==================== REDUCER ====================
        function taskReducer(state, action) {
            switch (action.type) {
                case ADD_TASK:
                    return {
                        ...state,
                        tasks: [
                            ...state.tasks,
                            {
                                id: Date.now(),
                                text: action.payload,
                                completed: false,
                                priority: 'medium',
                                createdAt: Date.now()
                            }
                        ]
                    };

                case TOGGLE_TASK:
                    return {
                        ...state,
                        tasks: state.tasks.map(task =>
                            task.id === action.payload
                                ? { ...task, completed: !task.completed }
                                : task
                        )
                    };

                case DELETE_TASK:
                    return {
                        ...state,
                        tasks: state.tasks.filter(task => task.id !== action.payload)
                    };

                case EDIT_TASK:
                    return {
                        ...state,
                        tasks: state.tasks.map(task =>
                            task.id === action.payload.id
                                ? { ...task, text: action.payload.text }
                                : task
                        )
                    };

                case SET_FILTER:
                    return {
                        ...state,
                        filter: action.payload
                    };

                case CLEAR_COMPLETED:
                    return {
                        ...state,
                        tasks: state.tasks.filter(task => !task.completed)
                    };

                case SET_PRIORITY:
                    return {
                        ...state,
                        tasks: state.tasks.map(task =>
                            task.id === action.payload.id
                                ? { ...task, priority: action.payload.priority }
                                : task
                        )
                    };

                default:
                    return state;
            }
        }

        // ==================== PROVIDER COMPONENT ====================
        function TaskProvider({ children }) {
            const [state, dispatch] = useReducer(taskReducer, initialState);

            return (
                <TaskContext.Provider value={{ state, dispatch }}>
                    {children}
                </TaskContext.Provider>
            );
        }

        // ==================== CUSTOM HOOK ====================
        function useTasks() {
            const context = useContext(TaskContext);
            if (!context) {
                throw new Error('useTasks must be used within a TaskProvider');
            }
            return context;
        }

        // ==================== TASK INPUT COMPONENT ====================
        function TaskInput() {
            const { dispatch } = useTasks();
            const inputRef = useRef(null);

            const handleSubmit = (e) => {
                e.preventDefault();
                const text = inputRef.current.value.trim();
                if (text) {
                    dispatch({ type: ADD_TASK, payload: text });
                    inputRef.current.value = '';
                    inputRef.current.focus();
                }
            };

            return (
                <form onSubmit={handleSubmit} className="input-section">
                    <input
                        ref={inputRef}
                        type="text"
                        placeholder="What needs to be done?"
                        className="task-input"
                        autoFocus
                    />
                    <button type="submit" className="add-btn">
                        Add Task
                    </button>
                </form>
            );
        }

        // ==================== FILTER BUTTONS COMPONENT ====================
        function FilterButtons() {
            const { state, dispatch } = useTasks();
            const filters = [
                { key: 'all', label: 'All Tasks' },
                { key: 'active', label: 'Active' },
                { key: 'completed', label: 'Completed' }
            ];

            return (
                <div className="filter-section">
                    {filters.map(({ key, label }) => (
                        <button
                            key={key}
                            className={`filter-btn ${state.filter === key ? 'active' : ''}`}
                            onClick={() => dispatch({ type: SET_FILTER, payload: key })}
                        >
                            {label}
                        </button>
                    ))}
                </div>
            );
        }

        // ==================== STATS COMPONENT ====================
        function StatsBar() {
            const { state, dispatch } = useTasks();
            const completedCount = state.tasks.filter(t => t.completed).length;
            const totalCount = state.tasks.length;
            const activeCount = totalCount - completedCount;

            return (
                <div className="stats-bar">
                    <span>
                        <strong>{activeCount}</strong> active · <strong>{completedCount}</strong> completed
                    </span>
                    {completedCount > 0 && (
                        <button 
                            className="clear-completed"
                            onClick={() => dispatch({ type: CLEAR_COMPLETED })}
                        >
                            Clear Completed
                        </button>
                    )}
                </div>
            );
        }

        // ==================== TASK ITEM COMPONENT ====================
        function TaskItem({ task }) {
            const { dispatch } = useTasks();
            const [isEditing, setIsEditing] = useState(false);
            const editInputRef = useRef(null);
            const [editText, setEditText] = useState(task.text);

            // Focus input when editing starts
            useEffect(() => {
                if (isEditing && editInputRef.current) {
                    editInputRef.current.focus();
                    editInputRef.current.select();
                }
            }, [isEditing]);

            const handleSave = () => {
                const trimmed = editText.trim();
                if (trimmed && trimmed !== task.text) {
                    dispatch({
                        type: EDIT_TASK,
                        payload: { id: task.id, text: trimmed }
                    });
                }
                setIsEditing(false);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    handleSave();
                } else if (e.key === 'Escape') {
                    setEditText(task.text);
                    setIsEditing(false);
                }
            };

            const getPriorityBadge = () => {
                const badges = {
                    high: 'badge-high',
                    medium: 'badge-medium',
                    low: 'badge-low'
                };
                const labels = { high: 'High', medium: 'Medium', low: 'Low' };
                return (
                    <span className={`priority-badge ${badges[task.priority]}`}>
                        {labels[task.priority]}
                    </span>
                );
            };

            return (
                <li className={`task-item ${task.completed ? 'completed' : ''}`}>
                    <div
                        className={`checkbox ${task.completed ? 'checked' : ''}`}
                        onClick={() => dispatch({ type: TOGGLE_TASK, payload: task.id })}
                    />

                    <div className="task-content">
                        {isEditing ? (
                            <input
                                ref={editInputRef}
                                type="text"
                                value={editText}
                                onChange={(e) => setEditText(e.target.value)}
                                onKeyDown={handleKeyDown}
                                onBlur={handleSave}
                                className="edit-input"
                            />
                        ) : (
                            <>
                                <span 
                                    className="task-text"
                                    onClick={() => setIsEditing(true)}
                                    title="Click to edit"
                                >
                                    {task.text}
                                </span>
                                {getPriorityBadge()}
                            </>
                        )}
                    </div>

                    <div className="task-actions">
                        {isEditing ? (
                            <>
                                <button
                                    className="icon-btn save-btn"
                                    onClick={handleSave}
                                    title="Save"
                                >
                                    ✓
                                </button>
                                <button
                                    className="icon-btn cancel-btn"
                                    onClick={() => {
                                        setEditText(task.text);
                                        setIsEditing(false);
                                    }}
                                    title="Cancel"
                                >
                                    ✕
                                </button>
                            </>
                        ) : (
                            <>
                                <button
                                    className="icon-btn edit-btn"
                                    onClick={() => setIsEditing(true)}
                                    title="Edit"
                                >
                                    ✎
                                </button>
                                <button
                                    className="icon-btn delete-btn"
                                    onClick={() => dispatch({ type: DELETE_TASK, payload: task.id })}
                                    title="Delete"
                                >
                                    🗑
                                </button>
                            </>
                        )}
                    </div>
                </li>
            );
        }

        // ==================== TASK LIST COMPONENT ====================
        function TaskList() {
            const { state } = useTasks();

            const filteredTasks = state.tasks.filter(task => {
                if (state.filter === 'active') return !task.completed;
                if (state.filter === 'completed') return task.completed;
                return true;
            });

            // Sort: active first, then by creation date
            const sortedTasks = [...filteredTasks].sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                return b.createdAt - a.createdAt;
            });

            if (sortedTasks.length === 0) {
                const messages = {
                    all: { icon: '📝', text: 'No tasks yet. Add one above!' },
                    active: { icon: '🎉', text: 'No active tasks. All done!' },
                    completed: { icon: '🤔', text: 'No completed tasks yet.' }
                };
                const msg = messages[state.filter];

                return (
                    <div className="empty-state">
                        <div className="empty-state-icon">{msg.icon}</div>
                        <p>{msg.text}</p>
                    </div>
                );
            }

            return (
                <ul className="task-list">
                    {sortedTasks.map(task => (
                        <TaskItem key={task.id} task={task} />
                    ))}
                </ul>
            );
        }

        // ==================== MAIN APP COMPONENT ====================
        function App() {
            return (
                <TaskProvider>
                    <div className="app-container">
                        <h1>Task Manager</h1>
                        <p className="subtitle">
                            Built with useContext, useReducer & useRef
                        </p>
                        
                        <TaskInput />
                        <FilterButtons />
                        <StatsBar />
                        <TaskList />
                    </div>
                </TaskProvider>
            );
        }

        // ==================== RENDER ====================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
